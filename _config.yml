# GitHub Pages configuration for intentguard.
#
# We use a custom Jekyll layout in _layouts/default.html instead of a
# pre-built theme. The layout pulls in Cormorant Garamond, Inter, and
# JetBrains Mono from Google Fonts and styles everything inline.

title: intentguard
description: A primitive for closing the web2 attack vector in DeFi. Solana and EVM. Open source.

# Leave blank for auto-detection on GitHub Pages.
url: ""
baseurl: ""

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

# Apply the default layout to every markdown page automatically, so
# intentguard.md and docs/HOWTO.md inherit the same chrome as index.md
# without needing per-file frontmatter.
defaults:
  - scope:
      path: ""
    values:
      layout: default
      author: Uwe Cerron
      twitter:
        username: traders_guild
        card: summary_large_image

# Files Jekyll should NOT copy into the published site.
exclude:
  - Cargo.toml
  - Cargo.lock
  - foundry.toml
  - "**/Cargo.toml"
  - "**/Cargo.lock"
  - "**/target"
  - "**/node_modules"
  - "**/*.rs"
  - "**/*.sol"
  - "**/*.ts"
  - "**/*.json"
  - "**/*.toml"
  - signer-cli
  - solana
  - contracts
  - evm
  - spec
  - .gitignore
  - .nojekyll-readme
  - LICENSE
  - README.md
